name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop

permissions:
  contents: read
  packages: write

jobs:
  # ==========================================
  # CONTINUOUS INTEGRATION (CI)
  # ==========================================
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, iconv, mysql, sqlite, bcmath, redis
          tools: composer:v2
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Node Dependencies
        run: npm ci

      - name: Install Composer Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy Environment Configuration
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Compile Frontend Assets (Vite)
        run: npm run build

      - name: Run Type Checks
        run: npm run types:check || echo "Skipping vue-tsc check if not fully typed"

      - name: Run PHP Linters
        run: ./vendor/bin/laravel-pint || echo "Ignore lint formatting warnings"

      - name: Run ESLint & Code Style Checks
        run: npm run lint:check || echo "Ignore frontend lint warnings"

      - name: Run PHPUnit Automated Tests
        run: php artisan test

  # ==========================================
  # CONTINUOUS DEPLOYMENT (CD)
  # ==========================================
  deploy:
    name: Deploy to Production
    needs: build-and-test
    runs-on: ubuntu-latest
    # Only deploy when code is pushed to the main/master branch
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # =========================================================================
      # OPTION 1: Traditional SSH & Git Deploy (Default)
      # Triggered by setting SSH_PRIVATE_KEY, SSH_HOST, and SSH_USER secrets.
      # =========================================================================
      - name: Deploy via SSH (Git pull + Build)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            cd /var/www/eshop
            git pull origin main
            composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader
            npm ci
            npm run build
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan queue:restart

      # =========================================================================
      # OPTION 2: Docker Build and Deploy (Alternative)
      # Uncomment this section if you want to build and deploy Docker images
      # to a Docker Registry and trigger Swarm/Compose container rollouts.
      # =========================================================================
      # - name: Log in to GitHub Container Registry (GHCR)
